# ============================================================
# KPPDF v5.0 — docker-compose.prod.yml (Synology)
# ============================================================
# Cycle v3.4 — FINAL migration to PostgreSQL.
# No SQLite. No file:. No dual-adapter.
# DATABASE_URL must be set in .env or in the shell before deploy.
# ============================================================
# Использование:
#   docker compose -f deploy/docker-compose.prod.yml up -d
# ============================================================

services:
  kppdf50:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: kppdf50
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - DADATA_API_KEY=${DADATA_API_KEY}
      - HOSTNAME=0.0.0.0
      - PORT=3000
    volumes:
      # Загрузки (фото товаров, CAD, аватары) — персистентность
      - kppdf50_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(_ => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  default:
    external:
      name: kppdf50-net

volumes:
  kppdf50_uploads:
    driver: local
