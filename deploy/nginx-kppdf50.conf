# ============================================================
# KPPDF v5.0 — nginx-kppdf50.conf [ИСТОРИЧЕСКИЙ]
# ============================================================
# ВНИМАНИЕ: Этот конфиг для Synology DSM (nginx/1.18.0).
# Текущий конфиг для Ubuntu: /etc/nginx/sites-enabled/kppdf
# (nginx/1.24.0, автоматически обновляется deploy-v5.sh)
# ============================================================
# Reverse proxy для Synology DSM
# ============================================================
# Установка на Synology:
#   1. SSH на Synology
#   2. cp nginx-kppdf50.conf /etc/nginx/sites-enabled/kppdf50
#   3. nginx -s reload
#   ИЛИ через Панель управления → Приложения → Обратный прокси
# ============================================================

server {
    listen 80;
    server_name kppdf.local;

    # Перенаправление HTTP → HTTPS (если настроен SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kppdf.local;

    # SSL (настройте под свои сертификаты Synology)
    ssl_certificate     /usr/syno/etc/certificate/system/default/fullchain.pem;
    ssl_certificate_key /usr/syno/etc/certificate/system/default/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Максимальный размер загружаемых файлов (фото, CAD)
    client_max_body_size 100M;

    # Корень для статических файлов (иконка)
    root /usr/syno/synoman/web;

    # ─── Основной прокси на Next.js ────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # Буферизация
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # ─── Кеширование статики Next.js ───────────────────────
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 302 365d;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    location /uploads {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── Favicon ───────────────────────────────────────────
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        log_not_found off;
        access_log off;
    }

    # ─── Логирование ───────────────────────────────────────
    access_log /var/log/nginx/kppdf50_access.log;
    error_log  /var/log/nginx/kppdf50_error.log warn;
}
