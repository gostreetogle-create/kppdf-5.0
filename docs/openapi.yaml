    post:
      summary: Создать задачу заказа
      tags: [Production]
      responses:
        '201':
          description: Задача создана

  /order-tasks/{id}:
    get:
      summary: Задача по ID
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Задача
    put:
