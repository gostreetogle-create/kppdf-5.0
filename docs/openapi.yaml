openapi: 3.0.3
info:
  title: KPPDF CRM API
  description: REST API для системы управления коммерческими предложениями KPPDF CRM
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Development server

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      summary: Вход в систему
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      accessToken:
                        type: string
          headers:
            Set-Cookie:
              description: JWT cookies (accessToken, refreshToken)

    delete:
      summary: Выход из системы
      tags: [Auth]
      responses:
        '200':
          description: Cookies удалены

  /auth/refresh:
    post:
      summary: Обновление токена
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Новый accessToken

  /seed:
    post:
      summary: Seed данных (только bootstrap)
      tags: [System]
      security: []
      responses:
        '200':
          description: Данные созданы

  /clients:
    get:
      summary: Список клиентов
      tags: [Clients]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: type
          in: query
          schema:
            type: string
            enum: [individual, legal]
      responses:
        '200':
          description: Список клиентов
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Client'
                      total:
                        type: integer

    post:
      summary: Создать клиента
      tags: [Clients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '201':
          description: Клиент создан

  /clients/{id}:
    get:
      summary: Клиент по ID
      tags: [Clients]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Клиент
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Client'

    put:
      summary: Обновить клиента
      tags: [Clients]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: Клиент обновлён

    delete:
      summary: Удалить клиента
      tags: [Clients]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Клиент удалён

  /organizations:
    get:
      summary: Список организаций
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
      responses:
        '200':
          description: Список организаций

    post:
      summary: Создать организацию
      tags: [Organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                inn:
                  type: string
                kpp:
                  type: string
      responses:
        '201':
          description: Организация создана

  /organizations/{id}:
    get:
      summary: Организация по ID
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Организация

    put:
      summary: Обновить организацию
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Организация обновлена

    delete:
      summary: Удалить организацию
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Организация удалена

  /products:
    get:
      summary: Список товаров
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: categoryId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Список товаров

    post:
      summary: Создать товар
      tags: [Products]
      responses:
        '201':
          description: Товар создан

  /products/{id}:
    get:
      summary: Товар по ID
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Товар

    put:
      summary: Обновить товар
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Товар обновлён

    delete:
      summary: Удалить товар
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Товар удалён

  /proposals:
    get:
      summary: Список коммерческих предложений
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, accepted, rejected, paid, converted]
      responses:
        '200':
          description: Список КП

    post:
      summary: Создать КП
      tags: [Proposals]
      responses:
        '201':
          description: КП создано

  /proposals/{id}:
    get:
      summary: КП по ID
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: КП

    put:
      summary: Обновить КП
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: КП обновлено

    patch:
      summary: Изменить статус КП
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [draft, sent, accepted, rejected, paid, converted]
      responses:
        '200':
          description: Статус обновлён

    delete:
      summary: Удалить КП
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: КП удалено

  /proposals/{id}/versions:
    post:
      summary: Создать новую версию КП
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '201':
          description: Новая версия создана

  /proposals/{id}/convert:
    post:
      summary: Конвертировать КП в договор
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Договор создан

  /shipments:
    get:
      summary: Список отгрузок
      tags: [Warehouse]
      responses:
        '200':
          description: Список отгрузок
    post:
      summary: Создать отгрузку
      tags: [Warehouse]
      responses:
        '201':
          description: Отгрузка создана

  /shipments/{id}:
    get:
      summary: Отгрузка по ID
      tags: [Warehouse]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Отгрузка
    put:
      summary: Обновить отгрузку
      tags: [Warehouse]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Отгрузка обновлена
    delete:
      summary: Удалить отгрузку
      tags: [Warehouse]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Отгрузка удалена

  /rpp-entries:
    get:
      summary: Список РПП записей
      tags: [Admin]
      responses:
        '200':
          description: Список записей
    post:
