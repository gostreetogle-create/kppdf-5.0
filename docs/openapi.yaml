      tags: [Cart]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Корзина удалена } }

  /cart/{id}/items:
    post:
      summary: Добавить товар в корзину
      tags: [Cart]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId: { type: string }
                quantity: { type: number }
      responses: { '201': { description: Товар добавлен } }

  /cart/{id}/items/{itemId}:
    patch:
      summary: Обновить количество
      tags: [Cart]
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity: { type: number }
      responses: { '200': { description: Количество обновлено } }
    delete:
      summary: Удалить позицию из корзины
      tags: [Cart]
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
        - name: itemId
          in: path
          required: true
          schema: { type: string }
      responses: { '200': { description: Позиция удалена } }

  /cart/{id}/convert:
    post:
      summary: Конвертировать корзину в КП
      tags: [Cart]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: КП создано } }

  # ============================================================
  # Dashboard
  # ============================================================
  /dashboard/stats:
    get:
      summary: Статистика дашборда
      tags: [Dashboard]
      responses: { '200': { description: Статистика } }

  /dashboard/aggregated:
    get:
      summary: Агрегированные данные
      tags: [Dashboard]
      responses:
        '200':
          description: Агрегированные данные
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      overview:
                        type: array
                        items:
                          type: object
                          properties:
                            title: { type: string }
                            count: { type: integer }
                            href: { type: string }
                      proposalStats:
                        type: array
                        items:
                          type: object
                          properties:
                            status: { type: string }
                            count: { type: integer }
                      categoryStats:
                        type: array
                        items:
                          type: object
                          properties:
                            name: { type: string }
                            count: { type: integer }

components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Cookie
      description: JWT token в cookie (accessToken)

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string }

    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
      description: Номер страницы

    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 500 }
      description: Количество записей на странице

    SearchParam:
      name: search
      in: query
      schema: { type: string }
      description: Поиск по названию/номеру

    SortParam:
      name: sort
      in: query
      schema: { type: string }
      description: Поле для сортировки (createdAt, name, number)

    StatusParam:
      name: status
      in: query
      schema: { type: string }
      description: Фильтр по статусу

  schemas:
    # ---------- Auth ----------
    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        displayName: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        role:
          type: string
          enum: [admin, manager, viewer, production, storekeeper, accountant]
        isActive: { type: boolean }

    # ---------- Organization ----------
    Organization:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        inn: { type: string, nullable: true }
        kpp: { type: string, nullable: true }
        ogrn: { type: string, nullable: true }
        legalAddress: { type: string, nullable: true }
        actualAddress: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        role: { type: string, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    OrganizationCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        inn: { type: string }
        kpp: { type: string }
        ogrn: { type: string }
        legalAddress: { type: string }
        phone: { type: string }
        email: { type: string }
        role: { type: string }

    OrganizationUpdate:
      type: object
      properties:
        name: { type: string }
        inn: { type: string }
        kpp: { type: string }
        legalAddress: { type: string }
        phone: { type: string }
        email: { type: string }

    # ---------- Person ----------
    Person:
      type: object
      properties:
        id: { type: string }
        lastName: { type: string }
        firstName: { type: string }
        patronymic: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        position: { type: string, nullable: true }
        organizationId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    PersonCreate:
      type: object
      required: [lastName, firstName]
      properties:
        lastName: { type: string }
        firstName: { type: string }
        patronymic: { type: string }
        phone: { type: string }
        email: { type: string }
        position: { type: string }
        organizationId: { type: string }

    # ---------- Product ----------
    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        sku: { type: string }
        unit: { type: string }
        defaultMarkupPercent: { type: number }
        categoryId: { type: string, nullable: true }
        description: { type: string, nullable: true }
        price: { type: number, nullable: true }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    ProductCreate:
      type: object
      required: [name, sku, unit]
      properties:
        name: { type: string }
        sku: { type: string }
        unit: { type: string }
        defaultMarkupPercent: { type: number }
        categoryId: { type: string }
        description: { type: string }
        price: { type: number }

    ProductCategory:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    ProductModule:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        article: { type: string, nullable: true }
        productId: { type: string, nullable: true }
        width: { type: number, nullable: true }
        height: { type: number, nullable: true }
        depth: { type: number, nullable: true }
        weight: { type: number, nullable: true }
        sortOrder: { type: integer }
        product: { $ref: '#/components/schemas/Product' }
        workTypes: { type: array, items: { $ref: '#/components/schemas/ProductModuleWorkType' } }
        materials: { type: array, items: { $ref: '#/components/schemas/ProductModuleMaterial' } }

    ProductModuleCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        article: { type: string }
        productId: { type: string }
        width: { type: number }
        height: { type: number }
        depth: { type: number }
        weight: { type: number }

    ProductModuleWorkType:
      type: object
      properties:
        workTypeId: { type: string }
        estimatedHours: { type: number }
        sortOrder: { type: integer }

    ProductModuleMaterial:
      type: object
      properties:
        name: { type: string }
        quantity: { type: number }
        unit: { type: string }
        isPurchased: { type: boolean }

    # ---------- Material ----------
    Material:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        article: { type: string, nullable: true }
        unit: { type: string }
        price: { type: number, nullable: true }
        description: { type: string, nullable: true }
        categoryId: { type: string, nullable: true }
        supplierId: { type: string, nullable: true }
        isPurchased: { type: boolean }
        createdAt: { type: string, format: date-time }

    MaterialCreate:
      type: object
      required: [name, unit]
      properties:
        name: { type: string }
        article: { type: string }
        unit: { type: string }
        price: { type: number }
        description: { type: string }
        categoryId: { type: string }
        supplierId: { type: string }
        isPurchased: { type: boolean }

    MaterialCategory:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }

    # ---------- Proposal ----------
    Proposal:
      type: object
      properties:
        id: { type: string }
        number: { type: string }
