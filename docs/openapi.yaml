openapi: 3.0.3
info:
  title: KPPDF CRM API
  description: REST API для системы управления коммерческими предложениями и производством
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Development

security:
  - BearerAuth: []

paths:
  # ============================================================
  # Auth
  # ============================================================
  /auth/login:
    post:
      summary: Вход в систему
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      user: { $ref: '#/components/schemas/User' }
                      accessToken: { type: string }
    delete:
      summary: Выход из системы
      tags: [Auth]
      responses:
        '200': { description: Cookies удалены }

  /auth/refresh:
    post:
      summary: Обновление токена
      tags: [Auth]
      security: []
      responses:
        '200': { description: Новый accessToken }

  /auth/me:
    get:
      summary: Текущий пользователь
      tags: [Auth]
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/User' }

  # ============================================================
  # System
  # ============================================================
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses: { '200': { description: OK } }

  /seed:
    post:
      summary: Заполнить тестовыми данными
      tags: [System]
      security: []
      responses: { '200': { description: Данные созданы } }

  /upload:
    post:
      summary: Загрузить файл
      tags: [System]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses: { '200': { description: Файл загружен } }

  /import/cad:
    post:
      summary: Импорт из CAD-систем
      tags: [Import]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      sku: { type: string }
      responses: { '200': { description: Импорт выполнен } }

  # ============================================================
  # Organizations
  # ============================================================
  /organizations:
    get:
      summary: Список организаций
      tags: [Organizations]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - name: role
          in: query
          schema: { type: string }
          description: Фильтр по роли (client, supplier, partner)
      responses:
        '200':
          description: Список организаций
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Organization' }
                      total: { type: integer }
    post:
      summary: Создать организацию
      tags: [Organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationCreate' }
      responses: { '201': { description: Организация создана } }

  /organizations/{id}:
    get:
      summary: Организация по ID
      tags: [Organizations]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Организация
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Organization' }
    put:
      summary: Обновить организацию
      tags: [Organizations]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrganizationUpdate' }
      responses: { '200': { description: Организация обновлена } }
    delete:
      summary: Удалить организацию
      tags: [Organizations]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Организация удалена } }

  /org-roles:
    get:
      summary: Список ролей организаций
      tags: [Organizations]
      responses:
        '200': { description: Список ролей }

  /dadata/find-by-inn:
    post:
      summary: Поиск организации по ИНН через DaData
      tags: [Organizations]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inn]
              properties:
                inn: { type: string }
      responses: { '200': { description: Данные организации } }

  # ============================================================
  # Persons
  # ============================================================
  /persons:
    get:
      summary: Список контактных лиц
      tags: [Persons]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Список контактных лиц
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Person' }
                      total: { type: integer }
    post:
      summary: Создать контактное лицо
      tags: [Persons]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PersonCreate' }
      responses: { '201': { description: Контактное лицо создано } }

  /persons/{id}:
    get:
      summary: Контактное лицо по ID
      tags: [Persons]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Контактное лицо
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Person' }
    put:
      summary: Обновить контактное лицо
      tags: [Persons]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Обновлено } }
    delete:
      summary: Удалить контактное лицо
      tags: [Persons]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Удалено } }

  # ============================================================
  # Products
  # ============================================================
  /products:
    get:
      summary: Список товаров
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - name: categoryId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Список товаров
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Product' }
                      total: { type: integer }
    post:
      summary: Создать товар
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses: { '201': { description: Товар создан } }

  /products/{id}:
    get:
      summary: Товар по ID
      tags: [Products]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Товар
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Product' }
    put:
      summary: Обновить товар
      tags: [Products]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Товар обновлён } }
    delete:
      summary: Удалить товар
      tags: [Products]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Товар удалён } }

  /products/categories:
    get:
      summary: Список категорий товаров
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ProductCategory' }
                      total: { type: integer }
    post:
      summary: Создать категорию
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                description: { type: string }
      responses: { '201': { description: Категория создана } }

  # ============================================================
  # Product Modules
  # ============================================================
  /product-modules:
    get:
      summary: Список модулей продуктов
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Список модулей
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ProductModule' }
                      total: { type: integer }
    post:
      summary: Создать модуль продукта
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductModuleCreate' }
      responses: { '201': { description: Модуль создан } }

  /product-modules/{id}:
    get:
      summary: Модуль продукта по ID
      tags: [Products]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Модуль
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/ProductModule' }
    put:
      summary: Обновить модуль
      tags: [Products]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Модуль обновлён } }
    delete:
      summary: Удалить модуль
      tags: [Products]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Модуль удалён } }

  # ============================================================
  # Materials
  # ============================================================
  /materials:
    get:
      summary: Список материалов
      tags: [Materials]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - name: categoryId
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Список материалов
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Material' }
                      total: { type: integer }
    post:
      summary: Создать материал
      tags: [Materials]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MaterialCreate' }
      responses: { '201': { description: Материал создан } }

  /materials/{id}:
    get:
      summary: Материал по ID
      tags: [Materials]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Материал
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Material' }
    put:
      summary: Обновить материал
      tags: [Materials]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Материал обновлён } }
    delete:
      summary: Удалить материал
      tags: [Materials]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Материал удалён } }

  /materials/categories:
    get:
      summary: Список категорий материалов
      tags: [Materials]
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/MaterialCategory' }
                      total: { type: integer }

  # ============================================================
  # Proposals
  # ============================================================
  /proposals:
    get:
      summary: Список КП
      tags: [Proposals]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Список КП
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Proposal' }
                      total: { type: integer }
    post:
      summary: Создать КП
      tags: [Proposals]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProposalCreate' }
      responses: { '201': { description: КП создано } }

  /proposals/{id}:
    get:
      summary: КП по ID
      tags: [Proposals]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: КП
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Proposal' }
    put:
      summary: Обновить КП
      tags: [Proposals]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: КП обновлено } }
    patch:
      summary: Изменить статус КП
      tags: [Proposals]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [draft, sent, accepted, rejected, paid, converted]
      responses: { '200': { description: Статус обновлён } }
    delete:
      summary: Удалить КП
      tags: [Proposals]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: КП удалено } }

  /proposals/{id}/versions:
    post:
      summary: Создать версию КП
      tags: [Proposals]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '201': { description: Версия создана } }

  /proposals/{id}/convert:
    post:
      summary: Конвертировать КП в договор
      tags: [Proposals]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Договор создан } }

  # ============================================================
  # Contracts
  # ============================================================
  /contracts:
    get:
      summary: Список договоров
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Список договоров
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/Contract' }
                      total: { type: integer }
    post:
      summary: Создать договор
      tags: [Contracts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContractCreate' }
      responses: { '201': { description: Договор создан } }

  /contracts/{id}:
    get:
      summary: Договор по ID
      tags: [Contracts]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Договор
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Contract' }
    put:
      summary: Обновить договор
      tags: [Contracts]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Договор обновлён } }
    patch:
      summary: Изменить статус договора
      tags: [Contracts]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Статус обновлён } }
    delete:
      summary: Удалить договор
      tags: [Contracts]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Договор удалён } }

  /contracts/{id}/convert-to-production:
    post:
      summary: Конвертировать в производственный заказ
      tags: [Contracts]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Заказ создан } }

  # ============================================================
  # Production
  # ============================================================
  /production-orders:
    get:
      summary: Список производственных заказов
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ProductionOrder' }
                      total: { type: integer }
    post:
      summary: Создать производственный заказ
      tags: [Production]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductionOrderCreate' }
      responses: { '201': { description: Заказ создан } }

  /production-orders/{id}:
    get:
      summary: Заказ по ID
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Заказ
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/ProductionOrder' }
    put:
      summary: Обновить заказ
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Заказ обновлён } }

  /production-orders/{id}/status:
    patch:
      summary: Изменить статус заказа
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [planned, in_progress, manufacturing, painting, shipping, completed, cancelled]
      responses: { '200': { description: Статус обновлён } }

  /order-tasks:
    get:
      summary: Список задач
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: productionOrderId
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/StatusParam'
      responses:
        '200':
          description: Список задач
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/OrderTask' }
                      total: { type: integer }
    post:
      summary: Создать задачу
      tags: [Production]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderTaskCreate' }
      responses: { '201': { description: Задача создана } }

  /order-tasks/{id}:
    get:
      summary: Задача по ID
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses:
        '200':
          description: Задача
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/OrderTask' }
    put:
      summary: Обновить задачу
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Задача обновлена } }
    delete:
      summary: Удалить задачу
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      responses: { '200': { description: Задача удалена } }

  /order-tasks/{id}/status:
    patch:
      summary: Изменить статус задачи
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, completed, blocked, cancelled]
      responses: { '200': { description: Статус обновлён } }

  /order-tasks/{id}/assign:
    patch:
      summary: Назначить исполнителя
      tags: [Production]
      parameters: [ { $ref: '#/components/parameters/IdParam' } ]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [workerId]
              properties:
                workerId: { type: string }
