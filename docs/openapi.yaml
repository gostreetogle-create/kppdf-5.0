  /work-centers/{id}:
    get:
      summary: Рабочий центр по ID
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Рабочий центр
    put:
      summary: Обновить рабочий центр
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
