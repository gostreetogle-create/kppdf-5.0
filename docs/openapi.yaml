  /document-templates/{id}/clone:
    post:
      summary: Клонировать шаблон документа
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '201':
          description: Шаблон склонирован

  /doc-types:
    get:
      summary: Список типов документов
      tags: [Admin]
      responses:
        '200':
          description: Список типов
    post:
      summary: Создать тип документа
      tags: [Admin]
      responses:
        '201':
          description: Тип создан

  /doc-types/{id}:
    get:
      summary: Тип документа по ID
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Тип
    put:
      summary: Обновить тип документа
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Тип обновлён
    delete:
      summary: Удалить тип документа
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Тип удалён

  /inventor-files:
    get:
      summary: Список файлов изобретателя
      tags: [Admin]
      responses:
        '200':
          description: Список файлов
    post:
      summary: Загрузить файл изобретателя
      tags: [Admin]
      responses:
        '201':
          description: Файл загружен

  /inventor-files/{id}:
    get:
      summary: Файл изобретателя по ID
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Файл
    put:
      summary: Обновить файл изобретателя
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Файл обновлён
    delete:
      summary: Удалить файл изобретателя
      tags: [Admin]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Файл удалён

  /upload:
    post:
      summary: Загрузить файл
      tags: [System]
      responses:
        '200':
          description: Файл загружен

  /order-history:
    get:
      summary: История изменений заказа
      tags: [Production]
      parameters:
        - name: orderId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: История

  /my-tasks:
    get:
      summary: Задачи текущего пользователя
      tags: [Production]
      responses:
        '200':
          description: Список задач

  /procurement-needs:
    get:
      summary: Потребности в закупках
      tags: [Warehouse]
      responses:
        '200':
          description: Список потребностей

  /contracts:
    get:
      summary: Список договоров
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, completed, cancelled]
      responses:
        '200':
          description: Список договоров

    post:
      summary: Создать договор
      tags: [Contracts]
      responses:
        '201':
          description: Договор создан

  /contracts/{id}:
    get:
      summary: Договор по ID
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Договор

    put:
      summary: Обновить договор
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Договор обновлён

    patch:
      summary: Изменить статус договора
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Статус обновлён

    delete:
      summary: Удалить договор
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Договор удалён

  /contracts/{id}/convert-to-production:
    post:
      summary: Конвертировать договор в производственный заказ
      tags: [Contracts]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Заказ создан

  /products/categories:
    get:
      summary: Список категорий товаров
      tags: [Products]
      responses:
        '200':
          description: Список категорий
    post:
      summary: Создать категорию товаров
      tags: [Products]
      responses:
        '201':
          description: Категория создана

  /product-modules:
