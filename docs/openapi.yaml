      responses:
        '200':
          description: Вид работ обновлён
    delete:
      summary: Удалить вид работ
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Вид работ удалён

  /work-centers:
    get:
      summary: Список рабочих центров
      tags: [Production]
      responses:
        '200':
          description: Список рабочих центров
    post:
      summary: Создать рабочий центр
