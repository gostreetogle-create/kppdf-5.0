    put:
      summary: Обновить модуль товара
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Модуль обновлён
    delete:
      summary: Удалить модуль товара
      tags: [Products]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Модуль удалён

  /production-orders:
    get:
      summary: Список производственных заказов
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Список заказов

    post:
      summary: Создать производственный заказ
      tags: [Production]
      responses:
        '201':
          description: Заказ создан

  /production-orders/{id}:
    get:
      summary: Заказ по ID
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Заказ

    put:
      summary: Обновить заказ
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Заказ обновлён

  /production-orders/{id}/status:
    patch:
      summary: Изменить статус заказа
      tags: [Production]
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [planned, in_progress, manufacturing, painting, shipping, completed, cancelled]
      responses:
        '200':
