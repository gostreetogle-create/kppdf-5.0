components:
  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Cookie
      description: JWT token в cookie (accessToken)

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20

    SearchParam:
      name: search
      in: query
      schema:
        type: string
      description: Поиск по названию/номеру

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [admin, manager, viewer, production, storekeeper, accountant]
        isActive:
          type: boolean

    Client:
      type: object
      properties:
        id:
          type: string
        lastName:
          type: string
        firstName:
          type: string
        phone:
          type: string
        email:
          type: string
        type:
          type: string
          enum: [individual, legal]
        companyName:
          type: string
        inn:
          type: string

    ClientCreate:
      type: object
      required: [lastName, firstName]
      properties:
        lastName:
          type: string
        firstName:
          type: string
        phone:
          type: string
        email:
          type: string
        type:
          type: string
          enum: [individual, legal]
          default: individual
        companyName:
          type: string
        inn:
          type: string
        kpp:
          type: string
        ogrn:
          type: string
        legalAddress:
          type: string

    ClientUpdate:
      type: object
      properties:
        lastName:
          type: string
        firstName:
          type: string
        phone:
          type: string
        email:
          type: string
        type:
          type: string
        companyName:
          type: string
        inn:
          type: string

    Proposal:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        status:
          type: string
        version:
          type: integer
        discountPercent:
          type: number
        vatRate:
          type: number
        clientId:
          type: string
        organizationId:
          type: string
        createdAt:
          type: string
          format: date-time

    Contract:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        clientId:
          type: string
        organizationId:
          type: string
        signedAt:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time

    ProductionOrder:
      type: object
      properties:
        id:
          type: string
        number:
          type: string
        status:
          type: string
        contractId:
          type: string
        proposalId:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    Organization:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        inn:
          type: string
        kpp:
          type: string
        legalAddress:
          type: string

    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        sku:
          type: string
        unit:
          type: string
        defaultMarkupPercent:
          type: number
        categoryId:
          type: string
